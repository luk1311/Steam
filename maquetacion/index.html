<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="https://mail.google.com">Gmail</a>
        <a href="https://images.google.com">Imagenes</a>
        <button class="icons-button">
            <img src="/img/apps.webp" alt="">
        </button>

        <button id="acceder-button">Acceder</button>
    </header>
    <main id="content"> 
        <img id="brand" src="/img/Google-Brand-Logo.png" alt="">

        <div id="search-container">

            <img class="search-icon" src="/img/search.png" alt="">

            <input id="search-input" type="text" placeholder="Buscar en Google">
            <button class="icons-button">
                <img src="/img/microphone.png" alt="">
            </button>
            <button class="icons-button">
                <img src="/img/capture.png" alt="">
            </button>
        </div>

        <div id="search-1">
            <button class="search-button">Buscar con Google</button>
            <button class="search-button">Voy a tener suerte</button>
        </div>

        <div id="search-2">
            <p id="parrafo">Google disponible en:</p>
            <a id="english-link" href="">English</a>
        </div>
      
    </main>

    <footer>
       <a href="">Configuración</a>
       <a href="">Privacidad</a>
       <a href="">Términos</a>
       <a href="">Ayuda</a>
    </footer>

</body>
</html>
